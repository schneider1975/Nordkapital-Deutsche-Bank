<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>NordKapital Bank</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      height:100vh;
      overflow:hidden;
      background:#06101d;
      color:white;
      position:relative;
    }

    .background{
      position:absolute;
      inset:0;
      background:
      radial-gradient(circle at top right,#12325f 0%,transparent 35%),
      radial-gradient(circle at bottom left,#0b2441 0%,transparent 40%),
      linear-gradient(to bottom,#06101d,#091726);
    }

    .glass-circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.03);
      backdrop-filter:blur(10px);
    }

    .circle1{
      width:250px;
      height:250px;
      top:-100px;
      right:-60px;
    }

    .circle2{
      width:180px;
      height:180px;
      bottom:-60px;
      left:-50px;
    }

    .container{
      position:relative;
      z-index:2;
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:24px;
    }

    .login-card{
      width:100%;
      max-width:430px;

      background:rgba(255,255,255,0.06);

      backdrop-filter:blur(25px);

      border:1px solid rgba(255,255,255,0.08);

      border-radius:34px;

      padding:40px 30px;

      box-shadow:
      0 10px 40px rgba(0,0,0,0.5),
      inset 0 1px 0 rgba(255,255,255,0.05);

      animation:fadeUp 1s ease;
    }

    @keyframes fadeUp{

      from{
        opacity:0;
        transform:translateY(40px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    .logo{
      text-align:center;
      margin-bottom:40px;
    }

    .logo-square{
      width:68px;
      height:68px;
      border:5px solid #3c8cff;
      margin:auto;
      transform:rotate(45deg);
      margin-bottom:24px;

      box-shadow:0 0 30px rgba(60,140,255,0.4);
    }

    .logo h1{
      font-size:38px;
      font-weight:800;
      letter-spacing:-1px;
    }

    .logo p{
      margin-top:8px;
      color:#91a0b7;
      font-size:13px;
      letter-spacing:4px;
    }

    .title{
      font-size:32px;
      font-weight:700;
      margin-bottom:10px;
    }

    .subtitle{
      color:#9dadc6;
      line-height:1.6;
      margin-bottom:35px;
    }

    .input-group{
      margin-bottom:22px;
    }

    .input-group label{
      display:block;
      margin-bottom:10px;
      color:#b8c3d4;
      font-size:14px;
      font-weight:500;
    }

    .input-group input{

      width:100%;
      padding:18px;

      border:none;
      outline:none;

      border-radius:18px;

      background:#0d1a2b;

      color:white;

      font-size:16px;

      transition:0.3s;
    }

    .input-group input:focus{

      border:1px solid #3c8cff;

      box-shadow:
      0 0 20px rgba(60,140,255,0.25);

    }

    .login-btn{

      width:100%;
      padding:18px;

      border:none;
      border-radius:18px;

      background:linear-gradient(135deg,#2d7dff,#59a2ff);

      color:white;

      font-size:17px;
      font-weight:700;

      cursor:pointer;

      transition:0.3s;

      margin-top:10px;
    }

    .login-btn:hover{

      transform:translateY(-2px);

      box-shadow:
      0 10px 25px rgba(45,125,255,0.35);

    }

    .security{

      margin-top:28px;

      display:flex;
      align-items:center;
      gap:10px;

      color:#93a0b5;

      font-size:13px;
    }

    .dot{

      width:10px;
      height:10px;
      border-radius:50%;

      background:#00d26a;

      box-shadow:0 0 10px #00d26a;
    }

    .footer{

      margin-top:35px;

      text-align:center;

      color:#66748c;

      font-size:12px;
    }

  </style>
</head>

<body>

  <div class="background"></div>

  <div class="glass-circle circle1"></div>
  <div class="glass-circle circle2"></div>

  <div class="container">

    <div class="login-card">

      <div class="logo">

        <div class="logo-square"></div>

        <h1>NordKapital</h1>

        <p>PRIVATE BANKING</p>

      </div>

      <h2 class="title">Anmelden</h2>

      <p class="subtitle">
        Sicherer Zugang zu Ihrem gesperrten Nachlasskonto.
      </p>

      <div class="input-group">

        <label>Kunden-ID</label>

        <input
          type="text"
          value="SCHNEIDER FRIEDA"
        >

      </div>

      <div class="input-group">

        <label>Passwort</label>

        <input
          type="password"
          value="SCHNEIDER1975"
        >

      </div>

      <button class="login-btn" onclick="login()">
        Sicher anmelden
      </button>

      <div class="security">

        <div class="dot"></div>

        TLS 256-Bit verschlüsselte Verbindung

      </div>

      <div class="footer">
        © 2026 NordKapital Privatbank AG
      </div>

    </div>

  </div>

  <script>

    function login(){

      const button = document.querySelector('.login-btn');

      button.innerHTML = "Verbindung wird hergestellt...";

      button.style.opacity = "0.8";

      setTimeout(() => {

        window.location.href = "dashboard.html";

      }, 2200);

    }

  </script>

</body>
</html>
